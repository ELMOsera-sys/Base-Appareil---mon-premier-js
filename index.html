<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Base Apparel coming soon page</title>

</head>
<body>
  <main class="container">
    <div class="logo-img">
      <img src="./images/logo.svg" alt="Logo" class="logo">
    </div>
    <div class="image-container">
      <img src="./images/hero-mobile.jpg" alt="Hero Image" class="hero-image">
      <img src="./images/hero-desktop.jpg" alt="Hero Image" class="hero-image-desktop">
    </div>
    <div class="content">
      <h1>
        <span class="pink">WE'RE </span>COMING SOON
      </h1>
      <p class="pink">
        Hello fellow shoppers! We're currently building our new fashion store. 
        Add your email below to stay up-to-date with announcements and our launch deals.
      </p>
      <form class="email-form" id="emailForm" novalidate>
        <input type="email" id="emailInput" placeholder="Email Address" required>
        <img src="./images/icon-error.svg" id="error-icon" alt="error icon">
        <button type="submit"> <img src="./images/icon-arrow.svg" alt="Submit"></button>
      </form>
    </div>
  </main>
      
  <footer>
    <p class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
      Coded by <a href="#">Elmo-Sera</a>.
    </p>
  </footer>
  <script src="index.js"></script>
</body>
</html>
